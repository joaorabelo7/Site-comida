<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NBA Food - Registrar</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>NBA FOOD</h1>
        <p>Crie sua conta e descubra comidas inspiradas nos jogadores e nos times</p>
    </div>

    <form class="register-form" action="main.html">

        <div class="input-box">
            <label>Nome</label>
            <input type="text" placeholder="Digite seu nome">
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Digite seu email">
        </div>

        <div class="input-box">
            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha">
        </div>

        <div class="input-box">
            <label>Confirmar Senha</label>
            <input type="password" placeholder="Confirme sua senha">
        </div>

        <button class="register-btn">Criar Conta</button>

        <p class="login-link">
            Já tem conta? <a href="login.html">Entrar</a>
        </p>

    </form>

</div>

</body>
</html>
